spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.9.50:5432/lineup}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LEVEL:ERROR}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_BINDER_LEVEL:ERROR}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000